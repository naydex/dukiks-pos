<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUKIKS POS - EMERGENCY BACKUP</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 110px 20px 40px 20px; background-color: #ff6b00; font-size: 22px; }
.logo-container { text-align: center; margin-top: 20px; }
.logo-container img { max-height: 150px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
h1 { text-align: center; font-weight: bold; font-size: 40px; color: white; margin-top: 10px; }
.subtitle { text-align: center; font-size: 11px; color: white; margin-bottom: 30px; }
.panel { max-width: 1000px; width: 100%; margin: 0 auto 40px auto; box-sizing: border-box; }
table { border-collapse: collapse; border-radius: 10px; overflow: hidden; background: white; width: 100%; }
th, td { padding: 10px 15px; text-align: left; }
th { background-color: black; color: white; }
td { color: black; border-bottom: 1px solid #eee; }
.white-panel { background-color: white; padding: 25px; border-radius: 15px; }
.white-panel h2 { text-align: center; color: black; margin-bottom: 22px; }
.summary-container { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
.summary-card { background: black; color: white; padding: 15px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 4px #333; }
.summary-card div { font-size: 12px; text-transform: uppercase; margin-bottom: 5px; color: #ff6b00; }
.summary-card span { font-size: 22px; font-weight: bold; }
.input-row { display: flex; flex-direction: column; margin-bottom: 15px; max-width: 850px; margin: 0 auto 15px auto; }
.input-row label { font-weight: bold; color: black; margin-bottom: 5px;}
.input-row input, .input-row select { padding: 10px; font-size: 22px; border: 2px solid #ccc; border-radius: 8px; transition: all 0.3s; width: 100%; box-sizing: border-box; }
.hidden-field { display: none; }
.order-table { width: 100%; max-width: 850px; margin: 20px auto; border-collapse: collapse; }
.order-table th, .order-table td { border: 1px solid #ccc; color: black; padding: 10px; }
.order-table select, .order-table input { width: 100%; font-size: 22px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
.action-btn { background-color: #000000; color: white; border: none; padding: 15px 40px; cursor: pointer; display: block; margin: 20px auto; font-size: 18px; font-weight: bold; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 6px #333; transition: all 0.2s; position: relative; }
.action-btn:hover { background-color: #ff6b00; box-shadow: 0 6px #b34a00; }
.action-btn:active { box-shadow: 0 2px #333; transform: translateY(4px); }
.del-btn { background: none; border: none; cursor: pointer; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.history-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
.success-state { background-color: #4cd964 !important; box-shadow: 0 6px #38a84d !important; }
.error-msg { color: #ff3b30; font-size: 16px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }
.history-panel { background-color: white; border-radius: 10px; padding: 20px; }
.history-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
.history-table th, .history-table td { border: 1px solid #ccc; padding: 8px; color: black; }
.history-table th { background-color: #f0f0f0; }
.floating-datetime { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); padding: 10px 25px; border-radius: 50px; text-align: center; z-index: 9999; color: white; }
.digital-time { font-size: 30px; font-weight: bold; line-height: 1; }
.date-display { font-size: 16px; margin-top: 5px; }
</style>
</head>
<body>

<div class="floating-datetime">
  <div class="digital-time" id="timePHT"></div>
  <div class="date-display" id="datePHT"></div>
</div>

<div class="logo-container">
  <img src="dukiks-logo.png" alt="Dukiks Logo">
</div>

<h1>Dukik's Hungry Hub</h1>
<div class="subtitle">Manual Menu Mode (Reliable for Opening)</div>

<div class="panel">
  <table>
    <thead><tr><th>Type</th><th>Menu</th><th>Code</th><th>Price</th></tr></thead>
    <tbody id="menuDisplayBody"></tbody>
  </table>
</div>

<div class="panel white-panel">
  <h2>Order Intake</h2>
  <div id="validationError" class="error-msg">⚠️ Please check Name, Address, and Items!</div>
  
  <div class="input-row">
    <label>Name</label>
    <input type="text" id="customerName" placeholder="Customer Name">
  </div>

  <div class="input-row">
    <label>Community</label>
    <select id="communitySelect" onchange="toggleAddressFields()">
      <option value="Home">Not in a Subdivision (Home/Street)</option>
      <option value="Ajoya">Ajoya</option>
      <option value="Alberlyn Box Hill Residences">Alberlyn Box Hill Residences</option>
      <option value="Alegria Palms 1">Alegria Palms 1</option>
      <option value="Alegria Palms 2">Alegria Palms 2</option>
      <option value="Alegria Palms 3">Alegria Palms 3</option>
      <option value="Deca Homes Mactan 1">Deca Homes Mactan 1</option>
      <option value="Deca Homes Mactan 2">Deca Homes Mactan 2</option>
      <option value="Deca Homes Mactan 3">Deca Homes Mactan 3</option>
      <option value="Deca Homes Mactan 4">Deca Homes Mactan 4</option>
      <option value="Deca Homes Mactan 5">Deca Homes Mactan 5</option>
      <option value="Saekyung">Saekyung</option>
      <option value="Pacific Grand Villas">Pacific Grand Villas</option>
      </select>
  </div>

  <div id="subdivisionGroup" class="hidden-field">
    <div class="input-row">
      <label>Block/Floor#</label>
      <input type="text" id="blockFloor" placeholder="Numbers only">
    </div>
    <div class="input-row">
      <label>Lot/Room#</label>
      <input type="text" id="lotRoom" placeholder="Numbers only">
    </div>
  </div>

  <div id="homeAddressGroup">
    <div class="input-row">
      <label>Home Address</label>
      <input type="text" id="customerAddress" placeholder="Street / Barangay / Landmark">
    </div>
  </div>
  
  <div class="input-row">
    <label>Notes</label>
    <input type="text" id="specialInstructions" placeholder="Special Instructions">
  </div>
  
  <table class="order-table" id="orderTable">
    <thead><tr><th>Order</th><th>Qty</th><th>Price</th></tr></thead>
    <tbody id="orderBody"></tbody>
  </table>

  <button class="action-btn" id="startNewOrderBtn">Log Order & Clear</button>
</div>

<div class="panel history-panel">
  <h3 style="text-align:center">Order History</h3>
  <div class="summary-container">
    <div class="summary-card"><div>Total Orders</div><span id="summaryTotalOrders">0</span></div>
    <div class="summary-card"><div>Total Sales</div><span id="summaryTotalSales">₱0.00</span></div>
    <div class="summary-card"><div>Best Seller</div><span id="summaryBestSeller">None</span></div>
  </div>
  <tbody id="historyBox"></tbody>
</div>

<script>
// --- MANUAL MENU SETUP ---
// Edit your items here directly. No more Google Sheet errors!
const menuData = [
  { menu: "Pork Steak with Rice", code: "PSWR", price: 149.00 },
  { menu: "Chicken Inasal with Rice", code: "CIWR", price: 139.00 },
  { menu: "Beef Tapa with Rice", code: "BTWR", price: 159.00 },
  { menu: "Extra Rice", code: "ER", price: 20.00 },
  { menu: "Coke Mismo", code: "CM", price: 25.00 }
];

function renderMenuDisplay() {
  const body = document.getElementById("menuDisplayBody");
  body.innerHTML = ""; 
  menuData.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>Meal</td><td>${item.menu}</td><td>${item.code}</td><td>₱${item.price.toFixed(2)}</td>`;
    body.appendChild(tr);
  });
}

function updateOrderDropdowns() {
  const optionsHtml = `<option value="">Select</option>` + 
    menuData.map(m => `<option value="${m.code}">${m.menu}</option>`).join('');
  document.querySelectorAll(".item-select").forEach(sel => {
    const currentVal = sel.value;
    sel.innerHTML = optionsHtml;
    sel.value = currentVal;
  });
}

// --- APP LOGIC ---
const orderBody = document.getElementById("orderBody");
const historyBox = document.getElementById("historyBox");
const nameInp = document.getElementById("customerName");
const commInp = document.getElementById("communitySelect");
const blkInp = document.getElementById("blockFloor");
const lotInp = document.getElementById("lotRoom");
const addrInp = document.getElementById("customerAddress");
let orderCounter = parseInt(localStorage.getItem("dukiks_counter")) || 101;

window.onload = () => {
  renderMenuDisplay();
  addOrderRow();
  updateClock();
  toggleAddressFields();
  if(localStorage.getItem("dukiks_history")) {
    historyBox.innerHTML = localStorage.getItem("dukiks_history");
  }
  updateSummary();
};

function toggleAddressFields() {
  const subGroup = document.getElementById("subdivisionGroup");
  const homeGroup = document.getElementById("homeAddressGroup");
  if(commInp.value === "Home") {
    subGroup.classList.add("hidden-field");
    homeGroup.classList.remove("hidden-field");
  } else {
    subGroup.classList.remove("hidden-field");
    homeGroup.classList.add("hidden-field");
  }
}

function addOrderRow() {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><select class="item-select" onchange="updateTable()"><option value="">Select</option>${menuData.map(m=>`<option value="${m.code}">${m.menu}</option>`).join('')}</select></td>
    <td><input type="number" value="1" min="1" oninput="updateTable()"></td>
    <td class="row-total">₱0.00</td>
  `;
  orderBody.appendChild(tr);
}

function updateTable() {
  let grandTotal = 0;
  const rows = orderBody.querySelectorAll("tr:not(#grandTotalRow)");
  rows.forEach((row, i) => {
    const code = row.querySelector("select").value;
    const qty = parseInt(row.querySelector("input").value) || 0;
    const item = menuData.find(m => m.code === code);
    const price = item ? item.price * qty : 0;
    row.querySelector(".row-total").textContent = "₱" + price.toFixed(2);
    grandTotal += price;
    if (i === rows.length - 1 && code !== "") addOrderRow();
  });
  const oldGT = document.getElementById("grandTotalRow");
  if(oldGT) oldGT.remove();
  const gtRow = document.createElement("tr");
  gtRow.id = "grandTotalRow";
  gtRow.innerHTML = `<td colspan="2" style="text-align:right; font-weight:bold;">Grand Total:</td><td style="color:red; font-weight:bold;">₱${grandTotal.toFixed(2)}</td>`;
  orderBody.appendChild(gtRow);
}

document.getElementById("startNewOrderBtn").onclick = function() {
  const rows = orderBody.querySelectorAll("tr:not(#grandTotalRow)");
  let orders = []; let total = 0; let hasItem = false;

  rows.forEach(r => {
    const code = r.querySelector("select").value;
    const qty = r.querySelector("input").value;
    const item = menuData.find(m => m.code === code);
    if(item) { orders.push(`${qty}x ${item.code}`); total += item.price * qty; hasItem = true; }
  });

  if(!nameInp.value.trim() || !hasItem) { alert("Check Name and Order!"); return; }

  const now = new Date();
  const refNum = `#${orderCounter++}`;
  let fullAddress = (commInp.value === "Home") ? addrInp.value : `${commInp.value} - Blk ${blkInp.value}, Lot ${lotInp.value}`;

  const hRow = document.createElement("tr");
  hRow.innerHTML = `<td>${refNum}</td><td>${nameInp.value}</td><td>${fullAddress}</td><td>₱${total.toFixed(2)}</td><td>${orders.join(", ")}</td>`;
  historyBox.prepend(hRow);
  
  localStorage.setItem("dukiks_counter", orderCounter);
  localStorage.setItem("dukiks_history", historyBox.innerHTML);
  updateSummary();
  
  // Reset Form
  nameInp.value = ""; addrInp.value = ""; orderBody.innerHTML = ""; addOrderRow();
};

function updateSummary() {
    const rows = historyBox.querySelectorAll("tr");
    document.getElementById("summaryTotalOrders").textContent = rows.length;
}

function updateClock() {
  const now = new Date();
  document.getElementById('timePHT').textContent = now.toLocaleTimeString();
  document.getElementById('datePHT').textContent = now.toDateString();
}
setInterval(updateClock, 1000);
</script>
</body>
</html>
